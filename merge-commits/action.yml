name: "Merge Commits"
description: >-
  This action merges commits from a source branch into a target branch by
  creating a pull request and optionally merging it.
author: "Fardjad Davari"
inputs:
  source-branch:
    description: "The name of the branch to merge the commits from."
    required: true
  target-branch:
    description: "The name of the branch to merge the commits into."
    default: ${{ github.head_ref || github.ref_name }}
  github-token:
    description: >-
      The GitHub token to use for creating the pull request and, by default,
      merging it.
    default: ${{ github.token }}
  merge-pr:
    description: >-
      Whether to merge the pull request after creating it. This first attempts
      an immediate merge and falls back to enabling auto-merge if GitHub
      rejects the immediate merge.
    default: "true"
outputs: {}
runs:
  using: "composite"
  steps:
    - id: create-pr
      shell: bash
      run: |
        REMOTE_REPO="https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        if git ls-remote --exit-code --heads "${REMOTE_REPO}" "${{ inputs.source-branch }}" > /dev/null; then
          echo "::warning:: PR already exists."
          exit 0
        fi

        git push "${REMOTE_REPO}" "HEAD:${{ inputs.source-branch }}"

        PR_URL=$(gh pr create -B "${{ inputs.target-branch }}" -H "${{ inputs.source-branch }}" -f)
        echo "pr-url=${PR_URL}" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ inputs.github-token }}
    - id: merge-pr
      if: steps.create-pr.outputs.pr-url
      shell: bash
      run: |
        if [ "${INPUT_MERGE_PR}" == "true" ]; then
          if ! GH_TOKEN="${INPUT_GITHUB_TOKEN}" gh pr merge --delete-branch --rebase "${PR_URL}"; then
            echo "::notice::Immediate merge failed; attempting auto-merge instead."
            GH_TOKEN="${INPUT_GITHUB_TOKEN}" gh pr merge --auto --delete-branch --rebase "${PR_URL}"
          fi
        fi
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_MERGE_PR: ${{ inputs.merge-pr }}
        PR_URL: ${{ steps.create-pr.outputs.pr-url }}
