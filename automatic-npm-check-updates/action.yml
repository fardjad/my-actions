name: "Automatic npm-check-updates"
description: >-
  This action provides an _opinionated workflow_ for updating dependencies in a
  Node.js project.
author: "Fardjad Davari"
inputs:
  source-branch:
    description: "The branch to create the PR with changes from."
    default: "automatic-npm-check-updates"
  target-branch:
    description: >-
      The branch to merge the changes into. Defaults to `github.head_ref` or 
      `github.ref_name`.
    default: "${{ github.head_ref || github.ref_name }}"
  github-token:
    description: >-
      The GitHub token to use for creating and merging the PR with the changes.
    default: ${{ github.token }}
  merge-pr:
    description: >-
      Whether to merge the pull request after creating it. This first attempts
      an immediate merge and falls back to enabling auto-merge if GitHub
      rejects the immediate merge.
    default: "true"
  minimum-release-age-days:
    description: >-
      The minimum age, in days, that a package version must reach before npm
      can install it or npm-check-updates can select it.
    default: 7
  working-directory:
    description: >-
      The package project directory to update, relative to the repository root.
      Use "." for the repository root.
    default: "."
  run-package-scripts:
    description: >-
      Whether to allow package lifecycle scripts while updating dependencies.
    default: "false"
  post-update-commands:
    description: >-
      The commands to run after updating the dependencies. They will be 
      executed in a bash shell.
    default: |
      npm audit fix --quiet --no-progress --no-fund || true

      npm version patch --no-git-tag-version
  verify-script:
    description: >-
      The script to run to verify the changes. This could be used to run 
      tests, etc.
    default: |
      npm run test
  commit-title:
    description: "The commit title."
    default: "Upgrade dependencies"
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Check the dependencies
      shell: bash
      run: |
        for cmd in npm npx node; do
          command -v $cmd >/dev/null || exit 1
        done
    - name: Automatic maintenance
      uses: fardjad/my-actions/automatic-maintenance@main
      env:
        AUTOMATIC_UPDATE_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      with:
        source-branch: ${{ inputs.source-branch }}
        target-branch: ${{ inputs.target-branch }}
        github-token: ${{ inputs.github-token }}
        merge-pr: ${{ inputs.merge-pr }}

        prepare-script: |
          #!/usr/bin/env bash

          set -euo pipefail

          npm install -g npm-check-updates
          command -v ncu >/dev/null || exit 1
        check-script: |
          #!/usr/bin/env bash

          set -euo pipefail

          minimum_release_age_days="${{ inputs.minimum-release-age-days }}"
          node "${{ github.action_path }}/scripts/check-updates.mjs" "${{ github.workspace }}" "${minimum_release_age_days}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" "${{ inputs.run-package-scripts }}"
        change-script: |
          #!/usr/bin/env bash

          set -euo pipefail
          utils="${{ github.action_path }}/../js-maintenance-utils/cli.mjs"

          minimum_release_age_days="${{ inputs.minimum-release-age-days }}"
          export npm_config_min_release_age="${minimum_release_age_days}"

          snapshot_dir="${{ runner.temp }}/automatic-npm-check-updates-before"
          rm -rf "${snapshot_dir}"
          node "${utils}" snapshot "${{ github.workspace }}" "${snapshot_dir}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" --lockfiles=package-lock.json

          package_dir="$(node "${utils}" resolve "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}")"
          pushd "${package_dir}"
          package_script_options=()
          if [ "${{ inputs.run-package-scripts }}" != "true" ]; then
            package_script_options+=(--ignore-scripts)
            export npm_config_ignore_scripts=true
          fi

          npm install --min-release-age="${minimum_release_age_days}" "${package_script_options[@]}"

          npm-check-updates --cooldown "${minimum_release_age_days}d" -u

          ${{ inputs.post-update-commands }}
          popd
        verify-script: |
          #!/usr/bin/env bash

          set -euo pipefail
          utils="${{ github.action_path }}/../js-maintenance-utils/cli.mjs"
          package_dir="$(node "${utils}" resolve "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}")"

          pushd "${package_dir}"
          ${{ inputs.verify-script }}
          popd
        commit-script: |
          #!/usr/bin/env bash

          set -euo pipefail
          utils="${{ github.action_path }}/../js-maintenance-utils/cli.mjs"

          node "${utils}" stage "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" --lockfiles=package-lock.json --add-lockfiles=subdirectory
          update_summary="$(node "${utils}" summary "${{ runner.temp }}/automatic-npm-check-updates-before" "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" --lockfiles=package-lock.json)"
          cat <<COMMIT_SCRIPT_EOF | git commit -F -
          ${{ inputs.commit-title }}

          ${update_summary}
          COMMIT_SCRIPT_EOF
