name: "Automatic Bun Update"
description: >-
  This action provides an _opinionated workflow_ for updating dependencies in a
  Bun project.
author: "Fardjad Davari"
inputs:
  source-branch:
    description: "The branch to create the PR with changes from."
    default: "automatic-bun-update"
  target-branch:
    description: >-
      The branch to merge the changes into. Defaults to `github.head_ref` or
      `github.ref_name`.
    default: "${{ github.head_ref || github.ref_name }}"
  github-token:
    description: >-
      The GitHub token to use for creating and merging the PR with the changes.
    default: ${{ github.token }}
  merge-pr:
    description: >-
      Whether to merge the pull request after creating it. This first attempts
      an immediate merge and falls back to enabling auto-merge if GitHub
      rejects the immediate merge.
    default: "true"
  upgrade-options:
    description: >-
      The options to pass to `bun update`. This value is appended verbatim to
      the command so it can include flags such as `--latest`, `--production`,
      or package selectors.
    default: "--latest"
  minimum-release-age-days:
    description: >-
      The minimum age, in days, that a package version must reach before Bun
      can install or update it.
    default: "7"
  working-directory:
    description: >-
      The package project directory to update, relative to the repository root.
      Use "." for the repository root.
    default: "."
  run-package-scripts:
    description: >-
      Whether to allow package lifecycle scripts while updating dependencies.
    default: "false"
  post-update-commands:
    description: >-
      The commands to run after updating the dependencies. They will be
      executed in a bash shell.
    default: |
      bun audit || true
  verify-script:
    description: >-
      The script to run to verify the changes. This could be used to run
      tests, etc.
    default: |
      bun run test
  commit-title:
    description: "The commit title."
    default: "Upgrade dependencies"
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Check the dependencies
      shell: bash
      run: |
        command -v bun >/dev/null || exit 1
    - name: Automatic maintenance
      uses: fardjad/my-actions/automatic-maintenance@main
      env:
        AUTOMATIC_UPDATE_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      with:
        source-branch: ${{ inputs.source-branch }}
        target-branch: ${{ inputs.target-branch }}
        github-token: ${{ inputs.github-token }}
        merge-pr: ${{ inputs.merge-pr }}
        check-script: |
          #!/usr/bin/env bash

          set -euo pipefail
          utils="${{ github.action_path }}/../js-maintenance-utils/cli.mjs"

          minimum_release_age_days="${{ inputs.minimum-release-age-days }}"
          bunfig_dir="${{ runner.temp }}/automatic-bun-update-bunfig"
          rm -rf "${bunfig_dir}"
          mkdir -p "${bunfig_dir}"
          printf '[install]\nminimumReleaseAge = %s\n' \
            "$((minimum_release_age_days * 24 * 60 * 60))" \
            > "${bunfig_dir}/.bunfig.toml"
          export XDG_CONFIG_HOME="${bunfig_dir}"

          bun "${utils}" resolve "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" >/dev/null
          bun "${{ github.action_path }}/scripts/check-updates.mjs" "${{ github.workspace }}" "${{ inputs.upgrade-options }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" "${{ inputs.run-package-scripts }}"
        change-script: |
          #!/usr/bin/env bash

          set -euo pipefail
          utils="${{ github.action_path }}/../js-maintenance-utils/cli.mjs"

          minimum_release_age_days="${{ inputs.minimum-release-age-days }}"
          bunfig_dir="${{ runner.temp }}/automatic-bun-update-bunfig"
          rm -rf "${bunfig_dir}"
          mkdir -p "${bunfig_dir}"
          printf '[install]\nminimumReleaseAge = %s\n' \
            "$((minimum_release_age_days * 24 * 60 * 60))" \
            > "${bunfig_dir}/.bunfig.toml"
          export XDG_CONFIG_HOME="${bunfig_dir}"

          snapshot_dir="${{ runner.temp }}/automatic-bun-update-before"
          rm -rf "${snapshot_dir}"
          package_dir="$(bun "${utils}" resolve "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}")"
          bun "${utils}" snapshot "${{ github.workspace }}" "${snapshot_dir}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" --lockfiles=bun.lock,bun.lockb

          pushd "${package_dir}"
          package_script_options=()
          if [ "${{ inputs.run-package-scripts }}" != "true" ]; then
            package_script_options+=(--ignore-scripts)
          fi

          bun update "${package_script_options[@]}" ${{ inputs.upgrade-options }}

          ${{ inputs.post-update-commands }}
          popd
        verify-script: |
          #!/usr/bin/env bash

          set -euo pipefail
          utils="${{ github.action_path }}/../js-maintenance-utils/cli.mjs"
          package_dir="$(bun "${utils}" resolve "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}")"

          pushd "${package_dir}"
          ${{ inputs.verify-script }}
          popd
        commit-script: |
          #!/usr/bin/env bash

          set -euo pipefail
          utils="${{ github.action_path }}/../js-maintenance-utils/cli.mjs"

          bun "${utils}" stage "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" --lockfiles=bun.lock,bun.lockb --add-lockfiles=always
          update_summary="$(bun "${utils}" summary "${{ runner.temp }}/automatic-bun-update-before" "${{ github.workspace }}" "${AUTOMATIC_UPDATE_WORKING_DIRECTORY}" --lockfiles=bun.lock,bun.lockb)"
          cat <<COMMIT_SCRIPT_EOF | git commit -F -
          ${{ inputs.commit-title }}

          ${update_summary}
          COMMIT_SCRIPT_EOF
